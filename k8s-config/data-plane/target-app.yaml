apiVersion: v1
kind: Service
metadata:
  name: target-app-service
  namespace: medical-data
  labels:
    app: target-app # Nhãn này để ServiceMonitor tìm thấy
spec:
  selector:
    app: target-app
  ports:
    - name: http
      protocol: TCP
      port: 80 # Đổi port của Service trùng với port của App cho đồng bộ
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-app
  namespace: medical-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-app
  template:
    metadata:
      labels:
        app: target-app
    spec:
      containers:
        - name: target-app
          image: minhquyen1325/target-app:v4
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MQTT_BROKER
              value: "mosquitto-service.medical-data.svc.cluster.local"
            - name: MQTT_PORT
              value: "1883"
