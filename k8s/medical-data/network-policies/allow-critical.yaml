# DATA PLANE — Allow Critical Traffic
# Explicitly allows:
#   1. Prometheus scraping from monitoring namespace
#   2. MQTT traffic to Mosquitto
#   3. Agent traffic from aiops namespace
#   4. Normal HTTP traffic (when not blocked by Agent policies)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-critical-traffic
  namespace: medical-data
spec:
  podSelector:
    matchLabels:
      app: target-app
  policyTypes:
  - Ingress
  ingress:
  # Allow Prometheus scraping
  - from:
    - namespaceSelector:
        matchLabels:
          purpose: observability
    ports:
    - protocol: TCP
      port: 8000
  # Allow AI Agent access
  - from:
    - namespaceSelector:
        matchLabels:
          purpose: intelligence-plane
  # Allow external traffic (will be restricted by Agent-applied policies)
  - from: []
    ports:
    - protocol: TCP
      port: 8000
