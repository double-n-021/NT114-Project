# DATA PLANE — Default Deny NetworkPolicy
# Security baseline: deny all ingress by default, then allow explicitly
#
# This follows the principle of least privilege
# Agent-applied policies (block-template.yaml) add specific deny rules on top
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: medical-data
spec:
  podSelector: {}
  policyTypes:
  - Ingress
