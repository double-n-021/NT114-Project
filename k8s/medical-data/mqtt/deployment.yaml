# DATA PLANE — Mosquitto MQTT Broker
# Architecture: "Mosquitto MQTT Broker — TCP LoadBalancer Service — External IP :1883"
#
# Receives vital sign data from MQTT publishers (simulators/mqtt_publisher.py)
# target-app subscribes to vitals/# topic
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: medical-data
  labels:
    app: mosquitto
    tier: data-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
      - name: mosquitto
        image: eclipse-mosquitto:2.0
        ports:
        - name: mqtt
          containerPort: 1883
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
      volumes:
      - name: config
        configMap:
          name: mosquitto-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: medical-data
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    persistence false
