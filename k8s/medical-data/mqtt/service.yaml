# DATA PLANE — Mosquitto Service
# Exposes MQTT broker on port 1883
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-service
  namespace: medical-data
  labels:
    app: mosquitto
spec:
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    protocol: TCP
    port: 1883
    targetPort: 1883
  type: NodePort    # minikube; change to LoadBalancer for AKS
