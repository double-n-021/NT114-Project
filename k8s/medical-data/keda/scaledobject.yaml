# DATA PLANE — KEDA ScaledObject CRD
# Architecture: "ScaledObject CRD — Watched by KEDA — Trigger: prometheus-latency
#                Min:1 Max:10 Cooldown:60s"
#
# KEDA watches this CRD and automatically creates/manages HPA for target-app
# Trigger: Prometheus query for latency p99
# When latency p99 > 200ms (0.2s threshold), KEDA scales up target-app replicas
#
# The AI Agent can modify this resource (minReplicaCount) via scale_tool.py
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: target-app-scaler
  namespace: medical-data
  labels:
    app: target-app
    managed-by: keda
spec:
  scaleTargetRef:
    name: target-app
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 60
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
      metricName: http_request_duration_p99
      query: |
        histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace="medical-data",service="target-app-service"}[1m])) by (le))
      threshold: "0.2"    # 200ms — QoS target from project specification
