# INTELLIGENCE PLANE — Agent RBAC
# The AI Agent needs permissions to:
#   1. READ: metrics from Prometheus (via HTTP, no RBAC needed)
#   2. WRITE: NetworkPolicy in medical-data namespace
#   3. WRITE: ScaledObject/Deployments in medical-data namespace
#   4. READ: Pod status in medical-data namespace (for verification)
#
# This follows the principle of least privilege:
# Agent can ONLY modify NetworkPolicy and scale Deployments in medical-data ns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-agent-sa
  namespace: aiops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-agent-role
rules:
# NetworkPolicy management (for DDoS blocking)
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# Deployment scaling
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "update", "patch"]
# KEDA ScaledObject management
- apiGroups: ["keda.sh"]
  resources: ["scaledobjects"]
  verbs: ["get", "list", "update", "patch"]
# Pod status (for verification)
- apiGroups: [""]
  resources: ["pods", "services", "nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-agent-binding
subjects:
- kind: ServiceAccount
  name: aiops-agent-sa
  namespace: aiops
roleRef:
  kind: ClusterRole
  name: aiops-agent-role
  apiGroup: rbac.authorization.k8s.io
