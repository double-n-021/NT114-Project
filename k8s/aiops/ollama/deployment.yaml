# INTELLIGENCE PLANE — Ollama (Local LLM)
# Architecture: "Local LLM - Ollama/Phi-3 — Optional GPU node
#                Fallback when cloud unavailable"
#
# Provides local LLM inference for the AI Agent
# Used for: development, cost comparison, offline fallback
# Models: phi3:mini (CPU-friendly), qwen2:7b (if GPU available)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: aiops
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      volumes:
      - name: ollama-data
        emptyDir:
          sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: aiops
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
  type: ClusterIP
