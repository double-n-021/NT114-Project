# Loki Stack Helm values override
# Architecture: "Loki — Log aggregation — LogQL queries — Retention: 30d"
#              "Promtail — DaemonSet — Collect pod logs — Ship to Loki"
#
# TODO: Configure when installing loki-stack Helm chart
# helm install loki grafana/loki-stack -n monitoring -f k8s/monitoring/loki/values-override.yaml
promtail:
  enabled: true

loki:
  persistence:
    enabled: false    # minikube; enable on AKS with Azure Blob Storage
  config:
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h    # 30 days
